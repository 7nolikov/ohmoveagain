# Home page
hero_tagline: "Moving to Croatia · the open-source Pipeline"
hero_h1: "Relocate to Croatia without guessing."
hero_subtitle: "The Pipeline is a practical, open-source, five-stage guide to moving to Croatia — what to do, in what order, which documents you need, and where the official source says so. Every claim is linked to a government or EU source with a verified date."
hero_byline_1: "I built the Pipeline while moving to Croatia myself. The official portals are fragmented, the blog posts skip the hard parts, and I kept hitting the same questions:"
