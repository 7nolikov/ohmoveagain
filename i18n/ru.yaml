why_exists_h2: "Зачем это нужно"
why_exists_p1: "Бо́льшая часть информации о переезде разбросана по официальным порталам, которые приходится собирать воедино самому, или похоронена в блогах, обходящих сложные вопросы. Этот сайт —"
why_exists_accent: "Pipeline с открытым кодом, поддерживаемый сообществом"
why_exists_p2: ": каждое утверждение ссылается на официальный источник с датой проверки, любой может открыть issue, чтобы сообщить об устаревшей информации, и pull request'ы приветствуются."
why_exists_posture: "Это общественное благо: бесплатно, лицензия MIT, поддерживается одним автором при участии сообщества. Нет paywall, нет платных тарифов, нет рассылок. План поддержки честный: пять источников меняются раз в год — CI-проверка актуальности и PR от сообщества и держат всё в форме."
