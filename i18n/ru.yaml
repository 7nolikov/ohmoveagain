# Home page
hero_tagline: "Переезд в Хорватию · Pipeline с открытым кодом"
hero_h1: "Переезжайте в Хорватию без догадок."
hero_subtitle: "Pipeline — практическое руководство с открытым кодом: пять этапов переезда в Хорватию — что делать, в каком порядке, какие документы нужны и где это подтверждает официальный источник. Каждое утверждение привязано к государственному или европейскому источнику с датой проверки."
hero_byline_1: "Я создавал Pipeline во время собственного переезда в Хорватию. Официальные порталы разрозненны, статьи в блогах обходят сложные моменты, а я всё время натыкался на одни и те же вопросы:"
hero_byline_question: "какая виза, в каком порядке, какие документы, к какому сроку?"
hero_byline_2: "Это Pipeline, который я хотел иметь сам — теперь с открытым кодом, чтобы оставаться актуальным."
see_five_stages: "Посмотреть пять этапов ↓"
runway_calculator: "Калькулятор финансового запаса"
pipeline_h2: "Pipeline · пять этапов"
pipeline_desc_1: "Каждый этап содержит предварительные требования, необходимые документы, чеклист с официальными источниками и типичные ошибки. Прогресс сохраняется"
pipeline_desc_locally: "локально в браузере"
pipeline_desc_2: "— никакие данные никуда не отправляются."
checks: "пунктов"
reset_all_confirm: "Сбросить весь прогресс?"
reset_all: "Сбросить всё"
export_pipeline: "↓ Экспорт Pipeline в Markdown"
export_pipeline_title: "Скачать прогресс Pipeline как Markdown-файл"
why_exists_h2: "Почему это существует"
why_exists_p1: "Большинство информации о переезде разбросано по официальным порталам, которые нужно собирать воедино самостоятельно, или спрятано в статьях блогов, обходящих сложные вопросы. Этот сайт —"
why_exists_accent: "Pipeline с открытым кодом, поддерживаемый сообществом"
why_exists_p2: ": каждое утверждение ссылается на официальный источник с датой проверки, любой может открыть issue для устаревшего контента, и pull request'ы приветствуются."
why_exists_posture: "Это общественное благо: бесплатно, лицензия MIT, поддерживается одним автором при участии сообщества. Нет paywall, нет платных уровней, нет рассылок. Пять источников обновляются ежегодно — CI проверка актуальности и PR от сообщества — это и есть план поддержки."
how_to_contribute: "Как внести вклад →"
