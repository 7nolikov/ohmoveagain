# Pet countdown shortcode
pc_title: "Калькулятор сроков для перевозки питомца"
pc_desc: "Введите запланированную дату вылета. Калькулятор отсчитывает назад через обязательную последовательность ЕС для ветеринарного паспорта питомца и показывает крайний срок для каждого шага."
pc_label_flight_date: "Дата вылета"
pc_th_step: "Шаг"
pc_th_deadline: "Крайний срок"
pc_th_days_from_today: "Дней от сегодня"
pc_th_status: "Статус"
pc_warn: "⚠ Один или несколько сроков уже прошли для выбранной даты вылета. Измените дату вылета или немедленно обратитесь к ветеринару."
pc_source_intro: "Применяется, когда страна происхождения"
pc_source_not: "не входит"
pc_source_intro2: "в таблицу признанных стран ЕС — сначала проверьте"
pc_source_listed: "список признанных стран"
pc_source_first: "."
pc_source_advice: "Не является юридической консультацией — проверьте у ветеринара и в органах страны назначения."
pc_source_verified: "проверено 2026-03-01"
pc_step_missed: "✗ просрочен"
pc_step_urgent: "⚡ срочно"
pc_step_ok: "✓ норм"
pc_days_future: "+{n} дней"
pc_days_today: "сегодня"
pc_days_ago: "{n} дней назад"
pc_step1_label: "1 · Микрочип (ISO 11784/11785)"
pc_step1_note: "Вживляется ДО прививки от бешенства. Если сделано ранее, убедитесь, что номер чипа есть в ветеринарных записях."
pc_step2_label: "2 · Прививка от бешенства"
pc_step2_note: "Делается после вживления чипа. Для непризнанных стран: необходимо сделать до {date}, чтобы успеть с 90-дневным ожиданием теста перед вылетом."
pc_step3_label: "3 · Тест на антитела к бешенству (для непризнанных стран)"
pc_step3_note: "Проводится не ранее чем через 90 дней после прививки. Результат должен быть ≥0,5 МЕ/мл. Учтите 2–4 недели на результат из лаборатории. Этот шаг не нужен, если страна происхождения включена в таблицу признанных стран ЕС."
pc_step4_label: "4 · Ветеринарный паспорт ЕС или ветеринарный сертификат"
pc_step4_note: "Выдаётся аккредитованным (официальным) ветеринаром. Должен содержать номер микрочипа, запись о вакцинации против бешенства и результат теста на антитела."
pc_step5_label: "5 · Официальный санитарный сертификат (окно 10 дней)"
pc_step5_note: "Выдаётся официальным государственным ветеринаром (не вашим обычным ветеринаром). Действителен 10 дней с момента выдачи. Записывайтесь заранее — мест мало."

# Pet Gantt shortcode
pg_caption: "Перевозка питомца в ЕС — последовательность действий до вылета"
pg_source_label: "Источник"
pg_source_verified: "проверено 2026-03-01"
pg_listed_title: "Признанная страна происхождения"
pg_listed_desc: "Тест на антитела к бешенству не нужен. Соблюдайте порядок: микрочип → прививка → документы."
pg_listed_step1: "Микрочип"
pg_listed_step1_note: "ISO 11784 / 11785. Вживляется до прививки от бешенства."
pg_listed_step2: "Прививка от бешенства"
pg_listed_step2_note: "Не менее чем за 21 день до поездки. Прививка — после чипирования."
pg_listed_step3: "Ветеринарный паспорт или сертификат"
pg_listed_step3_note: "Выдаётся уполномоченным ветеринаром с записями о чипе и прививке."
pg_listed_step4: "Окно санитарного сертификата"
pg_listed_step4_note: "Официальный сертификат в течение 10 дней до вылета (где требуется)."
pg_unlisted_title: "Непризнанная страна происхождения"
pg_unlisted_desc: "Сложный путь. Пропуск сроков теста может отсрочить переезд примерно на 3 месяца."
pg_unlisted_step1: "Микрочип"
pg_unlisted_step1_note: "До прививки от бешенства. Номер чипа должен совпадать во всех документах."
pg_unlisted_step2: "Прививка от бешенства — примерно за 16 недель до вылета"
pg_unlisted_step2_note: "Достаточно рано, чтобы успеть с 90-дневным ожиданием теста."
pg_unlisted_step3: "90-дневное ожидание + тест на антитела"
pg_unlisted_step3_note: "Забор крови после обязательного ожидания. Результат должен соответствовать порогу ЕС."
pg_unlisted_step4: "Ветеринарный паспорт или сертификат"
pg_unlisted_step4_note: "Включите документацию о чипе, прививке от бешенства и результате теста."
pg_unlisted_step5: "Санитарный сертификат в течение 10 дней"
pg_unlisted_step5_note: "Записывайтесь к официальному ветеринару заранее. Мест мало в период поездок."
pg_dependency_note: "<strong>Порядок зависимостей:</strong> сначала микрочип, затем прививка от бешенства, затем период ожидания и тест (если требуется страной происхождения), затем финальные проверки сертификатов для поездки."
pg_legend_normal: "обязательный шаг"
pg_legend_risk: "высокий временной риск"
pg_footer: "<strong>Непризнанная страна?</strong> Сначала проверьте <a href=\"https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en\" target=\"_blank\" rel=\"noopener noreferrer\">таблицу признанных стран ЕС</a>. Если страна происхождения <em>не</em> включена, начните процесс прививки и теста не менее чем за 16 недель до вылета. Используйте <a href=\"#pet-countdown\">калькулятор сроков</a> ниже для расчёта точных дат."
