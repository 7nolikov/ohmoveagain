# Home page
hero_tagline: "Переезд в Хорватию · Pipeline с открытым кодом"
hero_h1: "Переезжайте в Хорватию без догадок."
hero_subtitle: "Pipeline — практическое пятиэтапное руководство с открытым кодом: что делать, в каком порядке, какие документы нужны и где это подтверждает официальный источник. Каждое утверждение привязано к государственному источнику или источнику ЕС с датой проверки."
hero_byline_1: "Я создавал Pipeline во время собственного переезда в Хорватию. Официальные порталы разрозненны, статьи в блогах обходят сложные моменты, а я всё время натыкался на одни и те же вопросы:"
hero_byline_question: "какая виза, в каком порядке, какие документы, к какому сроку?"
hero_byline_2: "Это тот Pipeline, которого мне самому не хватало, — теперь с открытым кодом, чтобы он оставался актуальным."
see_five_stages: "Начать Pipeline переезда ↓"
runway_calculator: "Калькулятор финансового запаса"
pipeline_h2: "Pipeline · пять этапов"
pipeline_desc_1: "Каждый этап содержит предварительные требования, необходимые документы, чеклист с официальными источниками и типичные ошибки. Прогресс сохраняется"
pipeline_desc_locally: "локально в браузере"
pipeline_desc_2: "— никакие данные никуда не отправляются."
checks: "пунктов"
reset_all_confirm: "Сбросить весь прогресс?"
reset_all: "Сбросить всё"
export_pipeline: "↓ Экспорт Pipeline в Markdown"
