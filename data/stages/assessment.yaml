version: 2

sources:
  - id: mup-main
    url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
    type: official
    authorityScore: 5
    lastChecked: "2026-02-15"

  - id: eu-blue-card
    url: "https://home-affairs.ec.europa.eu/policies/migration-and-asylum/legal-migration-and-integration/work_en"
    type: supranational
    authorityScore: 3
    lastChecked: "2026-01-01"

  - id: porezna
    url: "https://www.porezna-uprava.hr/en/Pages/default.aspx"
    type: official
    authorityScore: 5
    lastChecked: "2026-03-01"

claims:
  - id: effective-tax-rate
    riskLevel: medium
    impact: "Incorrect financial planning"
    uncertainty: medium
    sourceId: porezna
    explanation: "Tax planning changes the real economics of a move before you choose a visa or legal structure."
    conflictNote: "Effective rate depends on income mix, residency status, and contribution rules."

  - id: dnv-income
    riskLevel: high
    impact: "Visa rejection"
    uncertainty: medium
    sourceId: mup-main
    lastReviewed: "2026-04-24"
    explanation: "This requirement determines whether you qualify before you spend time and money on an application."
    conflictNote: "Income thresholds can change annually, so stale numbers create false confidence."

  - id: blue-card-salary
    riskLevel: high
    impact: "Ineligible application"
    uncertainty: medium
    sourceId: eu-blue-card
    lastReviewed: "2026-04-24"
    explanation: "Salary thresholds are a gatekeeper for Blue Card eligibility and need to be checked before signing assumptions into your relocation plan."
    conflictNote: "Threshold interpretation can vary by year and local implementation details."

checklist:
  - id: tax-math
    items:
      - id: effective-tax-rate
      - id: runway-delta
        source:
          url: "https://7nolikov.dev/ohmoveagain/calculator/"
          asOf: "2026-04-18"
      - id: exit-taxes
        source:
          url: "https://www.oecd.org/tax/tax-policy/"
          asOf: "2026-01-01"

  - id: visa-pathway
    items:
      - id: visa-audit
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"
      - id: blue-card-salary
        appliesTo:
          visa: [blue-card]
      - id: dnv-income
        appliesTo:
          visa: [digital-nomad]
      - id: work-permit-sponsor
        appliesTo:
          visa: [work-permit]
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"
      - id: self-employment-register
        appliesTo:
          visa: [self-employment]
        source:
          url: "https://www.porezna-uprava.hr/en/Pages/default.aspx"
          asOf: "2026-03-01"
      - id: eu-eea-free-movement
        appliesTo:
          visa: [eu-eea]
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"
      - id: family-reunification-income
        appliesTo:
          visa: [family-reunification]
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"

  - id: reality-check
    items:
      - id: career-market
        source:
          url: "https://survey.stackoverflow.co/"
          asOf: "2026-04-01"
      - id: partner-alignment
        source:
          url: "https://www.oecd.org/els/mig/World-Migration-in-Figures.pdf"
          asOf: "2026-04-01"

artifacts:
  - id: runway-calc
    kind: calc
    href: "/calculator/"
