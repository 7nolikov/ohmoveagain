      - id: ground-transport
        phase: arrival-d1
      - id: eu-sim
        phase: arrival-d1
      - id: emergency-cash
        phase: arrival-d1
  - id: pets-in-transit
    items:
      - id: vet-health-cert
        appliesTo:
          pets: [dog-cat]
      - id: airline-booking
        appliesTo:
          pets: [dog-cat, other]
      - id: carrier-dimensions
        appliesTo:
          pets: [dog-cat]

artifacts: []
