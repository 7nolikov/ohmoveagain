  - id: originals-cabin
    riskLevel: high
    impact: "Critical document loss"
    uncertainty: low
    sourceId: hr-customs
  - id: customs-proof
    riskLevel: medium
    impact: "Border delay or additional scrutiny"
    uncertainty: medium
    sourceId: hr-customs
  - id: accommodation-30d
    riskLevel: medium
    impact: "Arrival instability"
    uncertainty: low
    sourceId: hr-customs
  - id: ground-transport
    riskLevel: low
    impact: "Arrival friction and wasted time"
    uncertainty: medium
    sourceId: hr-customs
  - id: eu-sim
    riskLevel: low
    impact: "Connectivity gap on arrival"
    uncertainty: low
    sourceId: eu-schengen
  - id: emergency-cash
    riskLevel: medium
    impact: "Payment failure during arrival"
    uncertainty: low
    sourceId: hnb
  - id: vet-health-cert
    riskLevel: high
    impact: "Pet denied travel"
    uncertainty: low
    sourceId: eu-pets
  - id: airline-booking
    riskLevel: medium
    impact: "Pet transport cancellation"
