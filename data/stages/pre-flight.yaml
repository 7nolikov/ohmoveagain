      - id: "spouse-work-status"
        appliesTo:
          family: [spouse, spouse-kids]
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"
      - id: "school-shortlist"
        appliesTo:
          family: [kids, spouse-kids]
        source:
          url: "https://mzo.gov.hr/"
          asOf: "2026-02-01"
      - id: "sponsor-income"
        appliesTo:
          family: [spouse, kids, spouse-kids]
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"

