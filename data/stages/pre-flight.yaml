# Structural data for stage: Pre-Flight
# Language-neutral. Strings live in content/stages/pre-flight.md.

checklist:
  - id: "travel-docs"
    items:
      - id: "passport-validity"
        source:
          url: "https://mup.gov.hr/"
          asOf: "2026-02-15"
      - id: "birth-cert-apostilled"
        source:
          url: "https://www.hcch.net/en/instruments/conventions/specialised-sections/apostille"
          asOf: "2026-01-01"
      - id: "criminal-background"
        source:
          url: "https://pravosudje.gov.hr/"
          asOf: "2026-02-01"
  - id: "eligibility-proof"
    items:
      - id: "diploma-recognition"
        source:
          url: "https://mzo.gov.hr/"
          asOf: "2026-02-01"
      - id: "accommodation-proof"
        source:
          url: "https://mup.gov.hr/stay-in-the-republic-of-croatia/281621"
          asOf: "2026-02-15"
      - id: "employment-contract"
        appliesTo:
          visa: [blue-card, work-permit]
        source:
          url: "https://home-affairs.ec.europa.eu/policies/migration-and-asylum/legal-migration-and-integration/work_en"
          asOf: "2026-01-01"
      - id: "dnv-income-proof"
        appliesTo:
