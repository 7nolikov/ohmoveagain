          asOf: "2026-03-01"
      - id: "pet-passport"
        appliesTo:
          pets: [dog-cat]
        source:
          url: "https://food.ec.europa.eu/animals/movement-pets_en"
          asOf: "2026-03-01"
      - id: "airline-pet-policy"
        appliesTo:
          pets: [dog-cat, other]
