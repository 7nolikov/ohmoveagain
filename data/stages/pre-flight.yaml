claims:
  - id: passport-validity
    impact: "Travel or filing disruption"
    sourceId: mup-root
  - id: birth-cert-apostilled
    impact: "Document rejection"
    sourceId: hcch-apostille
  - id: criminal-background
    impact: "Residency application delay or rejection"
    sourceId: hr-justice
  - id: diploma-recognition
    impact: "Work authorization mismatch"
    sourceId: hr-education
  - id: accommodation-proof
    impact: "Residency filing blocked"
    sourceId: mup-stay
  - id: employment-contract
    impact: "Blue Card or work permit ineligibility"
    sourceId: eu-blue-card
  - id: dnv-income-proof
    impact: "Digital nomad permit rejection"
    sourceId: mup-stay
  - id: business-registration
    impact: "Self-employment path blocked"
    sourceId: porezna
  - id: intl-health-insurance
    impact: "Coverage gap during arrival phase"
    sourceId: hzzo
  - id: landlord-registration-consent
    impact: "Address registration failure"
    sourceId: mup-stay
  - id: pet-microchip
    impact: "Pet travel non-compliance"
    sourceId: eu-pets
  - id: pet-rabies
    impact: "Pet denied travel"
    sourceId: eu-pets
  - id: pet-titer-test
    impact: "Pet entry delay"
    sourceId: eu-pets-unlisted
  - id: pet-passport
    impact: "Pet document rejection"
    sourceId: eu-pets
  - id: airline-pet-policy
    impact: "Flight logistics failure"
    sourceId: iata-live-animals
  - id: cites-docs
    impact: "Exotic pet transport blocked"
    sourceId: cites
  - id: marriage-cert
    impact: "Family reunification delay"
    sourceId: mup-stay
  - id: child-birth-certs
    impact: "Dependent filing blocked"
    sourceId: mup-stay
  - id: spouse-work-status
    impact: "Wrong family work assumptions"
    sourceId: mup-stay
  - id: school-shortlist
    impact: "Family logistics disruption"
    sourceId: hr-education
  - id: sponsor-income
    impact: "Family reunification ineligibility"
    sourceId: mup-stay

checklist:
  - id: travel-docs
    items:
      - id: passport-validity
      - id: birth-cert-apostilled
      - id: criminal-background
  - id: eligibility-proof
    items:
      - id: diploma-recognition
      - id: accommodation-proof
      - id: employment-contract
        appliesTo:
          visa: [blue-card, work-permit]
      - id: dnv-income-proof
        appliesTo:
          visa: [digital-nomad]
      - id: business-registration
        appliesTo:
          visa: [self-employment]
  - id: logistics-dry-run
    items:
      - id: intl-health-insurance
      - id: landlord-registration-consent
  - id: pets-pre-travel
    items:
      - id: pet-microchip
        appliesTo:
          pets: [dog-cat]
      - id: pet-rabies
        appliesTo:
          pets: [dog-cat]
      - id: pet-titer-test
        appliesTo:
          pets: [dog-cat]
      - id: pet-passport
        appliesTo:
          pets: [dog-cat]
      - id: airline-pet-policy
        appliesTo:
          pets: [dog-cat, other]
      - id: cites-docs
        appliesTo:
          pets: [other]
  - id: family-pre-travel
    items:
      - id: marriage-cert
        appliesTo:
          family: [spouse, spouse-kids]
      - id: child-birth-certs
        appliesTo:
          family: [kids, spouse-kids]
      - id: spouse-work-status
        appliesTo:
          family: [spouse, spouse-kids]
      - id: school-shortlist
        appliesTo:
          family: [kids, spouse-kids]
      - id: sponsor-income
        appliesTo:
          family: [spouse, kids, spouse-kids]

artifacts: []
