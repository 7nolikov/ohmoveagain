apostille-origin:
  label: Апостили (в стране происхождения, за документ)
  note: Зависит от страны происхождения и выдающего органа. Закладывайте 3–4
    документа.
court-translation:
  label: Судебно-заверенные переводы (за страницу)
  note: За страницу. Закладывайте 8–15 страниц на все документы.
criminal-background:
  label: Справка о несудимости (страна происхождения)
  note: Стоимость сильно варьируется по странам. Может потребоваться нотариус или
    апостиль.
mup-residency-permit:
  label: Сбор за разрешение на резидентство (MUP)
  note: Сбор зависит от типа разрешения и срока. Digital Nomad Visa — примерно
    70–100 EUR.
biometric-card:
  label: Биометрическая карта резидента
  note: Выдаётся отдельно от решения по разрешению. Оплачивается в FINA.
oib-registration:
  label: Регистрация OIB
  note: Бесплатно.
hzzo-retroactive:
  label: Медицинская страховка HZZO — ретроактивные взносы при поздней регистрации
  note: Применяется, только если вы были без страховки в период пробела. ~60–80
    EUR за месяц пробела. Закладывайте с запасом.
