HR:
  name: Хорватия
  note: Структура paušalni obrt для индивидуального SaaS. В Загребе развитая
    IT-среда.
  sourceLabel: Porezna uprava — подоходный налог
MNE:
  name: Черногория
  note: Самая низкая базовая ставка в регионе; слабый банковский сектор и
    ограниченный доступ к рынку ЕС.
  sourceLabel: Налоговая администрация Черногории
DE:
  name: Германия
  note: Сильный рынок, высокая налоговая нагрузка, строгая бюрократия. Дружелюбна
    к Blue Card.
  sourceLabel: Федеральное министерство финансов — подоходный налог
PT:
  name: Португалия
  note: Режим NHR заменён на IFICI — уже по охвату, но всё ещё привлекателен для
    отдельных профессий.
  sourceLabel: Autoridade Tributária — подоходный налог
EE:
  name: Эстония
  note: e-Residency — это НЕ налоговое резидентство. Корпоративная структура
    изящна; личная сторона стандартна.
  sourceLabel: Налогово-таможенный департамент Эстонии
GB:
  name: Великобритания
  note: База — Ltd-компания вне IR35. Внутри IR35 эффективная ставка выше. После
    Brexit — визовые сложности для HR.
  sourceLabel: HMRC — ставки подоходного налога
US:
  name: США
  note: "Сводная: федеральный налог + штат среднего уровня + налог самозанятых.
    Стоимость жизни — для города среднего уровня (Остин / Денвер). Сильно
    зависит от штата."
  sourceLabel: IRS — налоговые ставки и шкалы
NL:
  name: Нидерланды
  note: База — фрилансер ZZP. Ставки Box 1 высокие. Льгота 30% для недавно
    приехавших не учтена.
  sourceLabel: Belastingdienst — подоходный налог
FR:
  name: Франция
  note: База — micro-entrepreneur / auto-entrepreneur. Portage salarial поднимает
    эффективную ставку выше.
  sourceLabel: Главное управление государственных финансов — налоговые ставки
PL:
  name: Польша
  note: B2B-контрактор с фиксированным PIT + социальные и медицинские взносы ZUS.
    Льготная ставка IP Box не учтена.
  sourceLabel: Министерство финансов Польши — PIT
CZ:
  name: Чехия
  note: "OSVČ — индивидуальный предприниматель: подоходный налог + социальные и
    медицинские взносы с части базы прибыли."
  sourceLabel: Чешская финансовая администрация — подоходный налог
RS:
  name: Сербия
  note: Фиксированный PIT + взносы с потолком. Набирает популярность среди
    удалённых разработчиков. Нет единого рынка ЕС.
  sourceLabel: Налоговая администрация Сербии — подоходный налог
