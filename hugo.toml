baseURL = "https://7nolikov.dev/ohmoveagain/"
languageCode = "en-us"
title = "ohmoveagain — the open-source Pipeline for moving to Croatia"

# canonifyURLs = false is the default. All internal links must use
# relURL/absURL helpers so they resolve correctly under the /ohmoveagain/ subpath.
relativeURLs = false

enableRobotsTXT = true
enableGitInfo = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "The open-source Pipeline for moving to Croatia: five stages, sourced checklists, prerequisites, required documents, and a runway calculator. Community-maintained. Free."
  ogImage = "og.png"
  formspreeID = "mjgjelyd"
  githubURL = "https://github.com/7nolikov/ohmoveagain"
  twitterHandle = "@7nolikov"
  cfAnalyticsToken = "0813f8e9b0fe443ea2b3fb64f64f9893"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false

[build]
  writeStats = false

[security.exec]
  allow = ["^(dart-)?sass(-embedded)?$", "^go$", "^npx$", "^postcss$", "^git$"]

[permalinks]
  stages = "/stage/:slug/"
