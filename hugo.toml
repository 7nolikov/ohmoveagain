baseURL = "https://7nolikov.dev/ohmoveagain/"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "ohmoveagain — the open-source Pipeline for moving to Croatia"

[languages]
  [languages.en]
    languageCode = "en-us"
    languageName = "English"
    weight = 1
  [languages.ru]
    languageCode = "ru"
    languageName = "Русский"
    weight = 2
    title = "ohmoveagain — открытый Pipeline для переезда в Хорватию"
    [languages.ru.params]
      description = "Открытый пошаговый Pipeline для переезда в Хорватию: пять этапов, чеклисты с источниками, документы, калькулятор запаса. Поддерживается сообществом. Бесплатно."

# canonifyURLs = false is the default. All internal links must use
# relURL/absURL helpers so they resolve correctly under the /ohmoveagain/ subpath.
relativeURLs = false

enableRobotsTXT = true
enableGitInfo = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term"]

[params]
  description = "The open-source Pipeline for moving to Croatia: five stages, sourced checklists, prerequisites, required documents, and a runway calculator. Community-maintained. Free."
  ogImage = "og.png"
  githubURL = "https://github.com/7nolikov/ohmoveagain"
  twitterHandle = "@7nolikov"
  cfAnalyticsToken = "0813f8e9b0fe443ea2b3fb64f64f9893"
  trustAlgoVersion = "1.0"
  # Formspree form endpoint — create a form at formspree.io and paste the URL here
  # e.g. "https://formspree.io/f/xyzabcde"
  formspreeEndpoint = "https://formspree.io/f/mjgjelyd"

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false

[build]
  writeStats = false

[security.exec]
  allow = ["^(dart-)?sass(-embedded)?$", "^go$", "^npx$", "^postcss$", "^git$"]

[permalinks]
  stages = "/stage/:slug/"
