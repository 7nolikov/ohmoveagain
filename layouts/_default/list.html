{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  {{ with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end }}
  {{ .Content }}
  <div class="pipeline">
    {{ range .Pages.ByWeight }}
    <a class="stage-card" href="{{ .RelPermalink }}">
      <div class="step">{{ with .Weight }}Stage {{ . }} of {{ len $.Pages }}{{ end }}{{ with .Params.duration }} · {{ . }}{{ end }}</div>
      <div class="name">{{ .Title }}</div>
      <div class="desc">{{ .Params.subtitle }}</div>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
