<!doctype html>
<html lang="en">
<head>
{{- partial "head.html" . -}}
</head>
<body{{ with .Params.bodyClass }} class="{{ . }}"{{ end }}{{ with .Params.alpine }} x-data{{ end }}>
<a href="#main" class="sr-only">Skip to content</a>
{{- partial "header.html" . -}}
<main id="main" class="wrap">
{{ block "main" . }}{{ end }}
</main>
{{- partial "footer.html" . -}}
{{- if .Params.alpine -}}
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
{{- end -}}
</body>
</html>
