<script>
// ohma progress store — localStorage-backed, zero network, fully reactive.
document.addEventListener('alpine:init', () => {
  const KEY = 'ohma.v1';
  const PKEY = 'ohma.profile.v1';

  let initial;
  try { initial = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch (e) { initial = {}; }
  if (!initial || typeof initial !== 'object') initial = {};
  if (!initial.stages || typeof initial.stages !== 'object') initial.stages = {};

  let profile = { visa: 'all', family: 'all', pets: 'all' };
  try {
    const p = JSON.parse(localStorage.getItem(PKEY) || '{}');
    if (p.visa) profile.visa = p.visa;
    if (p.family) profile.family = p.family;
    if (p.pets) profile.pets = p.pets;
  } catch (e) {}
  const _qs = new URLSearchParams(window.location.search);
  if (_qs.get('visa')) profile.visa = _qs.get('visa');
  if (_qs.get('family')) profile.family = _qs.get('family');
  if (_qs.get('pets')) profile.pets = _qs.get('pets');

  Alpine.store('prog', {
    data: initial,
    profile: profile,

    _persist() {
      this.data.ts = Date.now();
      try { localStorage.setItem(KEY, JSON.stringify(this.data)); } catch (e) {}
    },
    setProfile(key, val) {
      this.profile[key] = val;
      try { localStorage.setItem(PKEY, JSON.stringify(this.profile)); } catch (e) {}
      const u = new URL(window.location);
      if (val === 'all') u.searchParams.delete(key);
      else u.searchParams.set(key, val);
      history.replaceState(null, '', u);
    },
    matchesProfile(ao) {
      if (!ao) return true;
      if (ao.visa   && ao.visa.length   && this.profile.visa   !== 'all' && !ao.visa.includes(this.profile.visa))     return false;
      if (ao.family && ao.family.length && this.profile.family !== 'all' && !ao.family.includes(this.profile.family)) return false;
      if (ao.pets   && ao.pets.length   && this.profile.pets   !== 'all' && !ao.pets.includes(this.profile.pets))     return false;
      return true;
    },

    toggle(stage, key) {
      const s = String(stage);
      if (!this.data.stages[s]) this.data.stages[s] = {};
      this.data.stages[s][key] = !this.data.stages[s][key];
      this._persist();
    },
    isChecked(stage, key) {
      const s = this.data.stages[String(stage)];
      return !!(s && s[key]);
    },

    // Unfiltered — used by home page stage cards and global dots
    count(stage) {
      const s = this.data.stages[String(stage)] || {};
      let n = 0;
      for (const k in s) if (s[k]) n++;
      return n;
    },
    status(stage, total) {
      const c = this.count(stage);
      if (total > 0 && c >= total) return 'exit 0';
      if (c > 0) return 'running';
      return 'not started';
    },
    pct(stage, total) {
      return total > 0 ? (100 * this.count(stage) / total) : 0;
    },
    totalDone() {
      let n = 0;
      const st = this.data.stages;
      for (const k in st) { const s = st[k]; for (const j in s) if (s[j]) n++; }
      return n;
    },

    // Profile-filtered — used by stage pages
    totalF(meta) {
      let n = 0;
      for (const m of meta) if (this.matchesProfile(m.ao)) n++;
      return n;
    },
    countF(stage, meta) {
      const s = this.data.stages[String(stage)] || {};
      let n = 0;
      for (const m of meta) if (this.matchesProfile(m.ao) && s[m.key]) n++;
      return n;
    },
    pctF(stage, meta) {
      const t = this.totalF(meta);
      return t > 0 ? 100 * this.countF(stage, meta) / t : 0;
    },
    statusF(stage, meta) {
      const t = this.totalF(meta);
      const c = this.countF(stage, meta);
      if (t > 0 && c >= t) return 'exit 0';
      if (c > 0) return 'running';
      return 'not started';
    },

    resetStage(stage) {
      delete this.data.stages[String(stage)];
      this._persist();
    },
    resetAll() {
      this.data.stages = {};
      this._persist();
    }
  });
});
</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
<script>
// hotkeys — vim + GitHub flavor. Disabled while typing.
(function () {
  const base = {{ site.Home.RelPermalink }};
  const stages = {
    '1': 'stage/assessment/',
    '2': 'stage/pre-flight/',
    '3': 'stage/migration/',
    '4': 'stage/initialization/',
    '5': 'stage/scaling/'
  };
  const slugToWeight = { 'assessment': 1, 'pre-flight': 2, 'migration': 3, 'initialization': 4, 'scaling': 5 };
  let gPrefix = false;
  let gTimer;
  const clearG = () => { gPrefix = false; clearTimeout(gTimer); };
  const inEditable = (el) => !el ? false : (el.tagName === 'INPUT' && el.type !== 'checkbox') || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT' || el.isContentEditable;
  const nav = (path) => { window.location.href = base + path; };
  const go = (hash) => { window.location.href = base + hash; };
  const openHelp = () => document.documentElement.classList.add('hk-open');
  const closeHelp = () => document.documentElement.classList.remove('hk-open');
  const items = () => Array.from(document.querySelectorAll('.checklist input[type=checkbox]'));
  const focusBy = (dir) => {
    const all = items();
    if (!all.length) return;
    const cur = document.activeElement;
    let i = all.indexOf(cur);
    if (i === -1) { i = dir > 0 ? -1 : all.length; }
    i = (i + dir + all.length) % all.length;
    all[i].focus();
    all[i].scrollIntoView({ block: 'center', behavior: 'smooth' });
  };
  const navStage = (dir) => {
    const m = window.location.pathname.match(/stage\/([^\/]+)\/?/);
    if (!m) return;
    const w = slugToWeight[m[1]];
    if (!w) return;
    const next = w + dir;
    if (stages[next]) nav(stages[next]);
  };

  document.addEventListener('keydown', (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key === 'Escape') { closeHelp(); clearG(); return; }
    if (inEditable(e.target)) return;
    if (e.key === '?') { e.preventDefault(); openHelp(); return; }

    if (gPrefix) {
      const k = e.key;
      clearG();
      if (k === 'h') { nav(''); return; }
      if (k === 'p') { go('#pipeline'); return; }
      if (k === 'c') { nav('calculator/'); return; }
      if (k === 'w') { nav('waitlist/'); return; }
      if (stages[k]) { nav(stages[k]); return; }
      return;
    }

    if (e.key === 'g') {
      gPrefix = true;
      gTimer = setTimeout(clearG, 1500);
      return;
    }

    switch (e.key) {
      case 'j': e.preventDefault(); focusBy(+1); return;
      case 'k': e.preventDefault(); focusBy(-1); return;
      case 'x':
      case ' ':
        if (document.activeElement && document.activeElement.type === 'checkbox' && document.activeElement.closest('.checklist')) {
          e.preventDefault();
          document.activeElement.click();
        }
        return;
      case 'n': navStage(+1); return;
      case 'N': navStage(-1); return;
    }
  });

  document.addEventListener('click', (e) => {
    if (e.target && e.target.matches('[data-hk-close]')) closeHelp();
  });
})();
</script>
</body>
</html>
