<div class="pet-countdown" x-data="petCountdown()" x-cloak>
  <h3 class="pet-countdown-title">{{ i18n "pc_title" }}</h3>
  <p class="pet-countdown-desc">{{ i18n "pc_desc" }}</p>

  <div class="pet-countdown-form">
    <label for="pc-flight-date">{{ i18n "pc_label_flight_date" }}</label>
    <input id="pc-flight-date" type="date" x-model="flightDate" :min="today" @change="calc">
  </div>

  <template x-if="flightDate && deadlines">
    <div class="pet-countdown-results">
      <table class="pc-table">
        <thead>
          <tr>
            <th>{{ i18n "pc_th_step" }}</th>
            <th>{{ i18n "pc_th_deadline" }}</th>
            <th>{{ i18n "pc_th_days_from_today" }}</th>
            <th>{{ i18n "pc_th_status" }}</th>
          </tr>
        </thead>
        <tbody>
          <template x-for="d in deadlines" :key="d.id">
            <tr :class="d.status">
              <td>
                <strong x-text="d.label"></strong>
                <div class="pc-note" x-text="d.note"></div>
              </td>
              <td x-text="d.date"></td>
              <td x-text="d.daysLabel"></td>
              <td>
                <span class="pc-status" x-text="d.statusLabel"></span>
              </td>
            </tr>
          </template>
        </tbody>
      </table>
      <p class="pet-countdown-warn" x-show="anyMissed">{{ i18n "pc_warn" }}</p>
      <p class="pet-countdown-source">
        <a href="https://food.ec.europa.eu/animals/movement-pets_en" target="_blank" rel="noopener noreferrer">EU Commission — movement of pet animals</a>
        ({{ i18n "pc_source_verified" }}).
        {{ i18n "pc_source_intro" }} <strong>{{ i18n "pc_source_not" }}</strong> {{ i18n "pc_source_intro2" }}
        <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">{{ i18n "pc_source_listed" }}</a>
        {{ i18n "pc_source_first" }}
        {{ i18n "pc_source_advice" }}
      </p>
    </div>
  </template>
</div>

<script>
window.OHMA_PET_I18N = {
  stepMissed:  {{ i18n "pc_step_missed" | jsonify }},
  stepUrgent:  {{ i18n "pc_step_urgent" | jsonify }},
  stepOk:      {{ i18n "pc_step_ok" | jsonify }},
  daysFuture:  {{ i18n "pc_days_future" | jsonify }},
  daysToday:   {{ i18n "pc_days_today" | jsonify }},
  daysAgo:     {{ i18n "pc_days_ago" | jsonify }},
  step1Label:  {{ i18n "pc_step1_label" | jsonify }},
  step1Note:   {{ i18n "pc_step1_note" | jsonify }},
  step2Label:  {{ i18n "pc_step2_label" | jsonify }},
  step2Note:   {{ i18n "pc_step2_note" | jsonify }},
  step3Label:  {{ i18n "pc_step3_label" | jsonify }},
  step3Note:   {{ i18n "pc_step3_note" | jsonify }},
  step4Label:  {{ i18n "pc_step4_label" | jsonify }},
  step4Note:   {{ i18n "pc_step4_note" | jsonify }},
  step5Label:  {{ i18n "pc_step5_label" | jsonify }},
  step5Note:   {{ i18n "pc_step5_note" | jsonify }},
};
function petCountdown() {
  const p = window.OHMA_PET_I18N || {};
  return {
    flightDate: '',
    deadlines: null,
    anyMissed: false,
    today: new Date().toISOString().slice(0, 10),
    fmt(d) {
      return d.toISOString().slice(0, 10);
    },
    daysDiff(isoDate) {
      const t = new Date(); t.setHours(0,0,0,0);
      const d = new Date(isoDate); d.setHours(0,0,0,0);
      return Math.round((d - t) / 86400000);
    },
    daysLabel(diff) {
      if (diff > 0) return (p.daysFuture || '+{n} days').replace('{n}', diff);
      if (diff === 0) return p.daysToday || 'today';
      return (p.daysAgo || '{n} days ago').replace('{n}', Math.abs(diff));
    },
    addDays(isoDate, n) {
      const d = new Date(isoDate);
      d.setDate(d.getDate() + n);
      return this.fmt(d);
    },
    subDays(isoDate, n) { return this.addDays(isoDate, -n); },
    statusOf(isoDate) {
      const diff = this.daysDiff(isoDate);
      if (diff < 0) return { status: 'pc-missed', statusLabel: p.stepMissed || '✗ missed' };
      if (diff <= 14) return { status: 'pc-urgent', statusLabel: p.stepUrgent || '⚡ urgent' };
      return { status: 'pc-ok', statusLabel: p.stepOk || '✓ ok' };
    },
    calc() {
      if (!this.flightDate) { this.deadlines = null; return; }
      const flight = this.flightDate;

      const rabiesLatest    = this.subDays(flight, 21);
      const vaccineMust     = this.subDays(flight, 111);
      const titerEarliest   = this.addDays(vaccineMust, 90);
      const titerLatest     = this.subDays(flight, 30);
      const microchipLatest = this.subDays(vaccineMust, 1);
      const healthCertFrom  = this.subDays(flight, 10);
      const healthCertTo    = this.subDays(flight, 1);

      const rows = [
        {
          id: 'microchip',
          label: p.step1Label || '1 · Microchip (ISO 11784/11785)',
          note: p.step1Note || '',
          date: 'Before ' + microchipLatest,
          daysFromToday: this.daysDiff(microchipLatest),
          daysLabel: this.daysLabel(this.daysDiff(microchipLatest)),
          ...this.statusOf(microchipLatest),
        },
        {
          id: 'rabies',
          label: p.step2Label || '2 · Rabies vaccination',
          note: (p.step2Note || '').replace('{date}', vaccineMust),
          date: 'By ' + vaccineMust,
          daysFromToday: this.daysDiff(vaccineMust),
          daysLabel: this.daysLabel(this.daysDiff(vaccineMust)),
          ...this.statusOf(vaccineMust),
        },
        {
          id: 'titer',
          label: p.step3Label || '3 · Rabies antibody titer test (unlisted countries)',
          note: p.step3Note || '',
          date: titerEarliest + ' – ' + titerLatest,
          daysFromToday: this.daysDiff(titerEarliest),
          daysLabel: this.daysLabel(this.daysDiff(titerEarliest)),
          ...this.statusOf(titerEarliest),
        },
        {
          id: 'passport',
          label: p.step4Label || '4 · EU Pet Passport or veterinary certificate',
          note: p.step4Note || '',
          date: 'Before ' + rabiesLatest,
          daysFromToday: this.daysDiff(rabiesLatest),
          daysLabel: this.daysLabel(this.daysDiff(rabiesLatest)),
          ...this.statusOf(rabiesLatest),
        },
        {
          id: 'healthcert',
          label: p.step5Label || '5 · Official health certificate (10-day window)',
          note: p.step5Note || '',
          date: healthCertFrom + ' – ' + healthCertTo,
          daysFromToday: this.daysDiff(healthCertFrom),
          daysLabel: this.daysLabel(this.daysDiff(healthCertFrom)),
          ...this.statusOf(healthCertFrom),
        },
      ];

      this.anyMissed = rows.some(r => r.status === 'pc-missed');
      this.deadlines = rows;
    }
  };
}
</script>
