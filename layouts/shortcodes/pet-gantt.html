{{/*
  Pet travel timeline — readable, responsive replacement for the old fixed SVG Gantt.
  The previous SVG had overlapping labels at narrow widths and around the flight-date edge.
  This version keeps the same content but lets text wrap naturally.
*/}}
<figure class="pet-gantt-wrap" aria-labelledby="pet-gantt-title">
  <style>
    .pet-gantt-wrap {
      margin: 22px 0 26px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
      overflow: hidden;
    }

    .pet-gantt-caption {
      margin: 0 0 14px;
      color: var(--fg);
      font-weight: 700;
      line-height: 1.35;
    }

    .pet-gantt-source {
      display: block;
      margin-top: 4px;
      color: var(--fg-muted);
      font-size: 0.78rem;
      font-weight: 400;
    }

    .pet-timeline {
      display: grid;
      gap: 12px;
    }

    .pet-path {
      display: grid;
      grid-template-columns: minmax(112px, 0.28fr) minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--border-bright);
      border-radius: var(--radius);
      background: rgba(11,14,15,0.52);
    }

    .pet-path-label {
      min-width: 0;
      padding: 10px 0;
      color: var(--fg);
    }

    .pet-path-label strong {
      display: block;
      color: var(--accent);
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .pet-path-label span {
      display: block;
      margin-top: 4px;
      color: var(--fg-dim);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .pet-steps {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      min-width: 0;
    }

    .pet-steps.unlisted {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .pet-step {
      position: relative;
      min-width: 0;
      min-height: 104px;
      padding: 10px 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-alt);
      overflow: hidden;
    }

    .pet-step::after {
      content: "";
      position: absolute;
      top: 22px;
      right: -8px;
      width: 16px;
      height: 1px;
      background: var(--accent-dim);
    }

    .pet-step:last-child::after {
      display: none;
    }

    .pet-step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin-bottom: 8px;
      border: 1px solid var(--accent-dim);
      border-radius: 999px;
      color: var(--accent);
      background: rgba(126,231,135,0.06);
      font-size: 0.72rem;
      font-weight: 800;
      line-height: 1;
    }

    .pet-step strong {
      display: block;
      min-width: 0;
      color: var(--fg);
      font-size: 0.82rem;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .pet-step span {
      display: block;
      min-width: 0;
      margin-top: 5px;
      color: var(--fg-dim);
      font-size: 0.74rem;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .pet-step.warn {
      border-color: rgba(245,166,35,0.55);
      background: rgba(245,166,35,0.06);
    }

    .pet-step.warn .pet-step-index {
      border-color: rgba(245,166,35,0.8);
      color: var(--warn);
      background: rgba(245,166,35,0.08);
    }

    .pet-step.flight {
      border-color: var(--accent-dim);
      background: rgba(126,231,135,0.06);
    }

    .pet-dependency-note,
    .pet-gantt-note {
      margin: 12px 0 0;
      padding: 10px 12px;
      border-left: 2px solid var(--accent-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: rgba(126,231,135,0.04);
      color: var(--fg-dim);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .pet-dependency-note strong,
    .pet-gantt-note strong {
      color: var(--fg);
    }

    .pet-gantt-note {
      border-left-color: var(--warn);
      background: rgba(245,166,35,0.06);
    }

    .pet-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin: 14px 0 0;
      color: var(--fg-muted);
      font-size: 0.76rem;
    }

    .pet-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pet-legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      background: var(--border-bright);
    }

    .pet-legend .ok i { background: var(--accent-dim); }
    .pet-legend .warn i { background: var(--warn); }

    @media (max-width: 860px) {
      .pet-path {
        grid-template-columns: 1fr;
      }

      .pet-path-label {
        padding: 0;
      }

      .pet-steps,
      .pet-steps.unlisted {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .pet-step::after {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .pet-gantt-wrap {
        padding: 12px;
      }

      .pet-steps,
      .pet-steps.unlisted {
        grid-template-columns: 1fr;
      }

      .pet-step {
        min-height: 0;
      }
    }
  </style>

  <figcaption id="pet-gantt-title" class="pet-gantt-caption">
    EU pet travel sequence — dependency timeline before flight
    <span class="pet-gantt-source">
      Source: <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">EU Commission — non-EU listed countries</a> · verified 2026-03-01
    </span>
  </figcaption>

  <div class="pet-timeline">
    <section class="pet-path" aria-labelledby="pet-listed-title">
      <div class="pet-path-label">
        <strong id="pet-listed-title">Listed origin country</strong>
        <span>No rabies antibody titer test. Still respect microchip → rabies → document timing.</span>
      </div>
      <div class="pet-steps" role="list">
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">01</span>
          <strong>Microchip</strong>
          <span>ISO 11784 / 11785. Must be implanted before rabies vaccination.</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">02</span>
          <strong>Rabies vaccine</strong>
          <span>At least 21 days before travel. Vaccine must be after the microchip.</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">03</span>
          <strong>Pet passport or veterinary certificate</strong>
          <span>Issued by an authorised vet with chip and vaccine records.</span>
        </div>
        <div class="pet-step flight" role="listitem">
          <span class="pet-step-index">04</span>
          <strong>Health certificate window</strong>
          <span>Official certificate within 10 days before flight, where required.</span>
        </div>
      </div>
    </section>

    <section class="pet-path" aria-labelledby="pet-unlisted-title">
      <div class="pet-path-label">
        <strong id="pet-unlisted-title">Unlisted origin country</strong>
        <span>Harder path. Missing the titer timing can delay the move by about 3 months.</span>
      </div>
      <div class="pet-steps unlisted" role="list">
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">01</span>
          <strong>Microchip</strong>
          <span>Complete before the rabies vaccine. The chip number must match all records.</span>
        </div>
        <div class="pet-step warn" role="listitem">
          <span class="pet-step-index">02</span>
          <strong>Rabies vaccine by ~16 weeks before flight</strong>
          <span>Needed early enough to leave room for the 90-day titer waiting period.</span>
        </div>
        <div class="pet-step warn" role="listitem">
          <span class="pet-step-index">03</span>
          <strong>90-day wait + titer test</strong>
          <span>Blood sample after the required wait. Result must meet the EU threshold.</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">04</span>
          <strong>Passport or veterinary certificate</strong>
          <span>Include microchip, rabies vaccine, and titer result documentation.</span>
        </div>
        <div class="pet-step flight" role="listitem">
          <span class="pet-step-index">05</span>
          <strong>Health certificate within 10 days</strong>
          <span>Book the official vet appointment early. Slots can be limited near travel.</span>
        </div>
      </div>
    </section>
  </div>

  <p class="pet-dependency-note">
    <strong>Dependency order:</strong> microchip first, then rabies vaccine, then the waiting period / titer path if your origin country requires it, then final travel certificate checks.
  </p>

  <div class="pet-legend" aria-label="Timeline legend">
    <span class="ok"><i aria-hidden="true"></i> normal required step</span>
    <span class="warn"><i aria-hidden="true"></i> hard timing risk</span>
  </div>

  <p class="pet-gantt-note">
    <strong>Unlisted country?</strong> Check the <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">EU listed-countries table</a> first. If your origin is <em>not</em> listed, start the vaccine-and-titer process at least 16 weeks before the planned flight. Use the <a href="#pet-countdown">pet deadline calculator</a> below to compute exact dates.
  </p>
</figure>
