{{/*
  Pet travel Gantt — shows the mandatory EU pet-passport sequence as a dependency timeline.
  Three scenarios rendered as separate rows with a shared timeline (weeks before flight = 0).
  Static SVG, no JS, screenshot-friendly.
*/}}
<figure class="pet-gantt-wrap">
  <figcaption class="pet-gantt-caption">
    EU pet travel sequence — weeks before flight date
    <span class="pet-gantt-source">
      Source: <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">EU Commission — non-EU listed countries</a> · verified 2026-03-01
    </span>
  </figcaption>

  <div class="pet-gantt-scroll">
  <svg viewBox="0 0 820 260" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="Pet travel dependency timeline showing required steps and lead times before flight"
       class="pet-gantt-svg">

    <!-- Background -->
    <rect width="820" height="260" fill="#11161a" rx="6"/>

    <!-- Week grid lines (week 0 = flight, left = earlier) -->
    <!-- Timeline: 0 to -20 weeks, displayed left→right as -20…0 -->
    <!-- Each week = 36px, offset left = 60px -->
    <!-- x = 60 + (20 - weeksBefore) * 36 -->

    <!-- Grid -->
    <g stroke="#1f2a31" stroke-width="1">
      <line x1="60" y1="30" x2="60" y2="240"/>
      <line x1="96" y1="30" x2="96" y2="240"/>
      <line x1="132" y1="30" x2="132" y2="240"/>
      <line x1="168" y1="30" x2="168" y2="240"/>
      <line x1="204" y1="30" x2="204" y2="240"/>
      <line x1="240" y1="30" x2="240" y2="240"/>
      <line x1="276" y1="30" x2="276" y2="240"/>
      <line x1="312" y1="30" x2="312" y2="240"/>
      <line x1="348" y1="30" x2="348" y2="240"/>
      <line x1="384" y1="30" x2="384" y2="240"/>
      <line x1="420" y1="30" x2="420" y2="240"/>
      <line x1="456" y1="30" x2="456" y2="240"/>
      <line x1="492" y1="30" x2="492" y2="240"/>
      <line x1="528" y1="30" x2="528" y2="240"/>
      <line x1="564" y1="30" x2="564" y2="240"/>
      <line x1="600" y1="30" x2="600" y2="240"/>
      <line x1="636" y1="30" x2="636" y2="240"/>
      <line x1="672" y1="30" x2="672" y2="240"/>
      <line x1="708" y1="30" x2="708" y2="240"/>
      <line x1="744" y1="30" x2="744" y2="240"/>
      <line x1="780" y1="30" x2="780" y2="240"/>
    </g>

    <!-- Week labels (–20 to 0) -->
    <g font-family="ui-monospace,monospace" font-size="9" fill="#5c6770" text-anchor="middle">
      <text x="60"  y="22">–20w</text>
      <text x="132" y="22">–18w</text>
      <text x="204" y="22">–16w</text>
      <text x="276" y="22">–14w</text>
      <text x="348" y="22">–12w</text>
      <text x="420" y="22">–10w</text>
      <text x="492" y="22">–8w</text>
      <text x="564" y="22">–6w</text>
      <text x="636" y="22">–4w</text>
      <text x="708" y="22">–2w</text>
      <text x="780" y="22">Flight</text>
    </g>

    <!-- Flight day marker -->
    <line x1="780" y1="28" x2="780" y2="245" stroke="#7ee787" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="782" y="252" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">✈ 0</text>

    <!--
      Row 1: Listed-country path (EU-listed origin — no titer test required)
      Microchip → Rabies vaccine (must be 3w before flight) → Pet passport → Health cert (10d before)
    -->
    <text x="8" y="58" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">Listed</text>
    <text x="8" y="68" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">country</text>

    <!-- Microchip: any time (shown at –12w as "anytime before vaccine") -->
    <rect x="60"  y="46" width="250" height="16" rx="3" fill="#2a3a44"/>
    <text x="66" y="58" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">🔷 microchip (before vaccine)</text>

    <!-- Rabies vaccine: at least 21 days before flight → –3w -->
    <rect x="684" y="46" width="36" height="16" rx="3" fill="#4a8953"/>
    <text x="688" y="58" font-family="ui-monospace,monospace" font-size="9" fill="#d7dee3">💉 rabies –3w</text>

    <!-- Pet passport: after vaccine + 21d wait = from –3w, valid at flight -->
    <rect x="720" y="46" width="36" height="16" rx="3" fill="#2a5c3a"/>
    <text x="724" y="58" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">📄 passport</text>

    <!-- Health cert: 10d window before flight -->
    <rect x="744" y="46" width="36" height="16" rx="3" fill="#1a3a28"/>
    <text x="748" y="58" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">🏥 health cert 10d</text>

    <!--
      Row 2: Unlisted-country path (requires titer test)
      Microchip → Rabies vaccine (–16w minimum) → 90-day wait → Titer test (–4w) → Pet passport → Health cert
    -->
    <text x="8" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">Unlisted</text>
    <text x="8" y="118" font-family="ui-monospace,monospace" font-size="9" fill="#f5a623">⚠ titer</text>

    <!-- Microchip: before vaccine (–17w+) -->
    <rect x="60"  y="96" width="178" height="16" rx="3" fill="#2a3a44"/>
    <text x="66" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">🔷 microchip</text>

    <!-- Rabies vaccine: must be at least 16w before flight (90d titer wait + 3w travel buffer) -->
    <rect x="240" y="96" width="36" height="16" rx="3" fill="#b45309"/>
    <text x="244" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#fef3c7">💉 rabies –16w</text>

    <!-- 90-day wait (13 weeks) -->
    <rect x="276" y="96" width="468" height="16" rx="3" fill="#1c2a1a" stroke="#4a8953" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="480" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#4a8953">←— 90-day wait (mandatory) —→</text>

    <!-- Titer test drawn at –3w; result must be ≥ 0.5 IU/mL -->
    <rect x="636" y="96" width="54" height="16" rx="3" fill="#78350f"/>
    <text x="640" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#fbbf24">🧪 titer –3w+</text>

    <!-- Pet passport (after titer result) -->
    <rect x="720" y="96" width="36" height="16" rx="3" fill="#2a5c3a"/>
    <text x="724" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">📄</text>

    <!-- Health cert -->
    <rect x="744" y="96" width="36" height="16" rx="3" fill="#1a3a28"/>
    <text x="748" y="108" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">🏥 10d</text>

    <!-- ⚠ Caption for titer trap -->
    <text x="240" y="125" font-family="ui-monospace,monospace" font-size="9" fill="#f5a623">⚠ start vaccine here or earlier — 4-month trap if you miss this</text>

    <!--
      Row 3: Dependency arrows summary
    -->
    <text x="8" y="165" font-family="ui-monospace,monospace" font-size="9" fill="#5c6770">Key</text>
    <text x="8" y="175" font-family="ui-monospace,monospace" font-size="9" fill="#5c6770">deps</text>

    <!-- Arrow: microchip → vaccine -->
    <line x1="160" y1="162" x2="238" y2="162" stroke="#4a8953" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="66" y="162" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">microchip</text>
    <text x="242" y="162" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">vaccine</text>

    <!-- Arrow: vaccine → 90d wait → titer -->
    <line x1="322" y1="162" x2="634" y2="162" stroke="#b45309" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4 2"/>
    <text x="440" y="158" font-family="ui-monospace,monospace" font-size="9" fill="#b45309">90 days</text>

    <!-- Arrow: titer → passport -->
    <line x1="694" y1="162" x2="718" y2="162" stroke="#4a8953" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="698" y="158" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">pass</text>

    <!-- Arrow: passport → health cert -->
    <line x1="732" y1="162" x2="742" y2="162" stroke="#4a8953" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="748" y="162" font-family="ui-monospace,monospace" font-size="9" fill="#7ee787">cert</text>

    <!-- Legend -->
    <rect x="60"  y="190" width="10" height="10" rx="2" fill="#b45309"/>
    <text x="74"  y="199" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">hard deadline (miss = delay move)</text>
    <rect x="60"  y="208" width="10" height="10" rx="2" fill="#4a8953"/>
    <text x="74"  y="217" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">step complete</text>
    <rect x="60"  y="226" width="10" height="10" rx="2" fill="#2a3a44"/>
    <text x="74"  y="235" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">flexible window</text>
    <rect x="220" y="190" width="10" height="10" rx="2" fill="#7ee787"/>
    <text x="234" y="199" font-family="ui-monospace,monospace" font-size="9" fill="#8a969e">Croatia entry</text>

    <!-- Arrow marker def -->
    <defs>
      <marker id="arr" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M 0 0 L 6 3 L 0 6 z" fill="#4a8953"/>
      </marker>
    </defs>
  </svg>
  </div>

  <p class="pet-gantt-note">
    <strong>Unlisted country?</strong> Check the <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">EU listed-countries table</a> first. If your origin is <em>not</em> listed, the titer test row applies — start the vaccine at least 16 weeks before your planned flight. Missing this by even one day means a 3-month delay. Use the <a href="#pet-countdown">pet deadline calculator</a> above to compute exact dates.
  </p>
</figure>
