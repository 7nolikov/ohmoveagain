<figure class="pet-gantt-wrap" aria-labelledby="pet-gantt-title">
  <figcaption id="pet-gantt-title" class="pet-gantt-caption">
    {{ i18n "pg_caption" }}
    <span class="pet-gantt-source">
      {{ i18n "pg_source_label" }}: <a href="https://food.ec.europa.eu/animals/movement-pets/non-eu-countries-listed_en" target="_blank" rel="noopener noreferrer">EU Commission — non-EU listed countries</a> · {{ i18n "pg_source_verified" }}
    </span>
  </figcaption>

  <div class="pet-timeline">
    <section class="pet-path" aria-labelledby="pet-listed-title">
      <div class="pet-path-label">
        <strong id="pet-listed-title">{{ i18n "pg_listed_title" }}</strong>
        <span>{{ i18n "pg_listed_desc" }}</span>
      </div>
      <div class="pet-steps" role="list">
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">01</span>
          <strong>{{ i18n "pg_listed_step1" }}</strong>
          <span>{{ i18n "pg_listed_step1_note" }}</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">02</span>
          <strong>{{ i18n "pg_listed_step2" }}</strong>
          <span>{{ i18n "pg_listed_step2_note" }}</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">03</span>
          <strong>{{ i18n "pg_listed_step3" }}</strong>
          <span>{{ i18n "pg_listed_step3_note" }}</span>
        </div>
        <div class="pet-step flight" role="listitem">
          <span class="pet-step-index">04</span>
          <strong>{{ i18n "pg_listed_step4" }}</strong>
          <span>{{ i18n "pg_listed_step4_note" }}</span>
        </div>
      </div>
    </section>

    <section class="pet-path" aria-labelledby="pet-unlisted-title">
      <div class="pet-path-label">
        <strong id="pet-unlisted-title">{{ i18n "pg_unlisted_title" }}</strong>
        <span>{{ i18n "pg_unlisted_desc" }}</span>
      </div>
      <div class="pet-steps unlisted" role="list">
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">01</span>
          <strong>{{ i18n "pg_unlisted_step1" }}</strong>
          <span>{{ i18n "pg_unlisted_step1_note" }}</span>
        </div>
        <div class="pet-step warn" role="listitem">
          <span class="pet-step-index">02</span>
          <strong>{{ i18n "pg_unlisted_step2" }}</strong>
          <span>{{ i18n "pg_unlisted_step2_note" }}</span>
        </div>
        <div class="pet-step warn" role="listitem">
          <span class="pet-step-index">03</span>
          <strong>{{ i18n "pg_unlisted_step3" }}</strong>
          <span>{{ i18n "pg_unlisted_step3_note" }}</span>
        </div>
        <div class="pet-step" role="listitem">
          <span class="pet-step-index">04</span>
          <strong>{{ i18n "pg_unlisted_step4" }}</strong>
          <span>{{ i18n "pg_unlisted_step4_note" }}</span>
        </div>
        <div class="pet-step flight" role="listitem">
          <span class="pet-step-index">05</span>
          <strong>{{ i18n "pg_unlisted_step5" }}</strong>
          <span>{{ i18n "pg_unlisted_step5_note" }}</span>
        </div>
      </div>
    </section>
  </div>

  <p class="pet-dependency-note">{{ i18n "pg_dependency_note" | safeHTML }}</p>

  <div class="pet-legend" aria-label="Timeline legend">
    <span class="ok"><i aria-hidden="true"></i> {{ i18n "pg_legend_normal" }}</span>
    <span class="warn"><i aria-hidden="true"></i> {{ i18n "pg_legend_risk" }}</span>
  </div>

  <p class="pet-gantt-note">{{ i18n "pg_footer" | safeHTML }}</p>
</figure>
