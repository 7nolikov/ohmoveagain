name: i18n validate

on:
  pull_request:
    paths:
      - 'content/stages/**'
      - 'scripts/**'
      - 'package.json'
      - 'hugo.toml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Check i18n parity
        run: node scripts/check-i18n-parity.mjs

      - name: Check i18n freshness (warn only)
        run: node scripts/check-i18n-freshness.mjs

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build site
        run: hugo --gc --minify
