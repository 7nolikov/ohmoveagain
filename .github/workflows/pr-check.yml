name: PR quality check (a11y + Lighthouse)

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'i18n/**'
      - 'content/**'
      - 'data/i18n/**'
      - 'launch/**'
      - '**.md'

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUGO_VERSION: "0.160.1"
  TZ: UTC
  PORT: 4000

jobs:
  quality:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Check source freshness (asOf dates)
        run: node scripts/check-staleness.mjs

      - name: Check i18n parity
        run: node scripts/check-i18n-parity.mjs

      - name: Generate build data (stats + changelog)
        run: node scripts/gen-build-data.mjs

      - name: Build site (localhost base URL for audit)
        run: hugo --gc --minify --baseURL "http://localhost:${{ env.PORT }}/ohmoveagain/"

      - name: Start static file server
        run: |
          npx serve ./public -l ${{ env.PORT }} &
          sleep 4

      - name: Install matching Chrome + ChromeDriver
        run: npx browser-driver-manager install chrome

      - name: Axe accessibility audit
        run: |
          npx @axe-core/cli \
            http://localhost:${{ env.PORT }}/ohmoveagain/ \
            http://localhost:${{ env.PORT }}/ohmoveagain/pipeline/ \
            http://localhost:${{ env.PORT }}/ohmoveagain/calculator/ \
            --exit \
            --disable color-contrast

      - name: Lighthouse CI audit
        run: |
          npx lhci autorun \
            --collect.url="http://localhost:${{ env.PORT }}/ohmoveagain/" \
            --collect.url="http://localhost:${{ env.PORT }}/ohmoveagain/pipeline/" \
            --collect.url="http://localhost:${{ env.PORT }}/ohmoveagain/calculator/"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (desktop + no-js only)
        run: npx playwright test --project desktop --project no-js
        env:
          BASE_URL: http://localhost:${{ env.PORT }}
          SITE_SUBPATH: /ohmoveagain
          CI: true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
