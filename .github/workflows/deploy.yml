name: Build & Deploy (Hugo → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.160.1"
  # no TZ-dependent template logic, but pinning keeps lastmod stable
  TZ: UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # auto-enable Pages on first run so the repo doesn't need a manual toggle
          enablement: true

      - name: Build site
        # configure-pages resolves the correct URL:
        #   - github.io project site → https://<user>.github.io/<repo>/
        #   - custom domain configured → https://7nolikov.dev/ohmoveagain/
        # Hugo --baseURL overrides hugo.toml so the site is never broken,
        # even before the custom domain is wired up.
        run: hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
