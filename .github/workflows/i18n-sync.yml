name: i18n sync

on:
  push:
    branches: [main]
    paths:
      - 'content/stages/**'

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: run translation sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-ru-translations.mjs

      - uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/i18n-sync
          title: auto i18n sync (ru)
          commit-message: auto i18n sync (ru)
