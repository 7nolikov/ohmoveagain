name: i18n: translate + validate content

on:
  push:
    branches: [main, temp]
    paths:
      - 'content/stages/**/*.md'
      - 'scripts/**'
      - 'data/i18n/**'
  pull_request:
    paths:
      - 'content/stages/**/*.md'
      - 'scripts/**'
      - 'data/i18n/**'

concurrency:
  group: i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translation-pipeline:
    name: Translation sync + validation
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync translations (AI)
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Detect translation changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated translations
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(i18n): auto-sync translations [skip ci]"
          git push

      - name: Validate translation structure (parity)
        run: npm run i18n:parity

      - name: Validate translation freshness (strict)
        run: |
          npm run i18n:freshness | tee output.txt
          if grep -q "stale:" output.txt; then
            echo "Translations are stale"
            exit 1
          fi
