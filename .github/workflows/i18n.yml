name: i18n translate + validate content

on:
  push:
    branches: [main]
    paths:
      - 'content/stages/**/*.md'
      - 'data/i18n/**'
  pull_request:
    paths:
      - 'content/stages/**/*.md'
      - 'data/i18n/**'

concurrency:
  group: i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translation-pipeline:
    name: Translation sync + validation
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync translations (AI)
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Validate translation structure (parity)
        run: npm run i18n:parity

      - name: Validate translation freshness (strict)
        run: npm run i18n:freshness

      - name: Commit updated translations
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            echo "no translation changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/stages
          git commit -m "chore(i18n): auto-sync translations"
          git push
