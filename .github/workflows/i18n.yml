name: i18n: translate + validate content

on:
  push:
    branches: [main, temp]
  pull_request:

jobs:
  translation-pipeline:
    name: Translation sync + validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Sync translations (AI)
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Detect translation changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated translations
        if: steps.changes.outputs.changed == 'true' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(i18n): auto-sync translations"
          git push

      - name: Validate translation structure (parity)
        run: npm run i18n:parity

      - name: Validate translation freshness (strict)
        run: |
          npm run i18n:freshness | tee output.txt
          if grep -q "stale:" output.txt; then
            echo "Translations are stale"
            exit 1
          fi
