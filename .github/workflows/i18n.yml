name: i18n-auto

on:
  push:
    branches: [main, temp]
  pull_request:

jobs:
  i18n:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run translation sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Commit updated translations
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(i18n): auto-sync translations"
          git push

      - name: Parity check
        run: npm run i18n:parity

      - name: Freshness check
        run: npm run i18n:freshness
