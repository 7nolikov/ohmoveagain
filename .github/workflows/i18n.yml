name: i18n translate + validate content

on:
  push:
    branches: [main]
    paths:
      - 'content/stages/**/*.md'
      - 'data/i18n/**'
  pull_request:
    paths:
      - 'content/stages/**/*.md'
      - 'data/i18n/**'

concurrency:
  group: i18n-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translation-pipeline:
    name: Translation sync + validation
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6.4.0
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync translations (AI)
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Validate translation structure (parity)
        run: npm run i18n:parity

      - name: Validate translation freshness (strict)
        run: npm run i18n:freshness

      - name: Open PR for translation changes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet; then
            echo "no translation changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="i18n/auto-sync-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add content/stages
          git commit -m "chore(i18n): auto-sync translations"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(i18n): auto-sync translations" \
            --body "Automated translation sync. Review translated strings before merging — LLM output flows into \`safeHTML\`/\`safeJS\` templates." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.REPO_TOKEN }}
