name: i18n-auto

on:
  push:
    branches: [main, temp]
  pull_request:

jobs:
  i18n:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Run translation sync
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
        run: npm run i18n:sync:ru

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit translations
        if: steps.changes.outputs.changed == 'true' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(i18n): auto-sync translations"
          git push

      - name: Parity check
        run: npm run i18n:parity

      - name: Freshness check (strict)
        run: |
          npm run i18n:freshness | tee output.txt
          if grep -q "stale:" output.txt; then
            echo "Translations are stale"
            exit 1
          fi
